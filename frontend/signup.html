<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix – Create Account</title>
  <link rel="stylesheet" href="signup.css" />
</head>
<body>

<div class="left-panel">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="left-content">
    <a href="index.html" class="logo">
      <div class="logo-icon"></div>
      <span class="logo-text">City<span>Fix</span></span>
    </a>

    <h2 class="left-tagline">Be the change<br>your city <span>needs.</span></h2>
    <p class="left-sub">Creating an account takes less than a minute. Start filing complaints and tracking civic issues today.</p>
  </div>

  <div class="left-footer">
    <p>Already have an account? <a href="login.html">Sign in →</a></p>
  </div>
</div>

<div class="right-panel">
  <div class="form-box">

    <div class="form-card">
      <div id="form-section">
        <div class="form-header">
          <h1 class="form-title">Create your account</h1>
          <p class="form-sub">Join CityFix and start making your city better</p>
        </div>

        <form id="signup-form" novalidate>
          <div class="field-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Yamuna Gandalla" />
          </div>

          <div class="field-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="yamuna@example.com" />
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min. 8 characters" />
          </div>

          <div class="field-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" placeholder="Re-enter password" />
          </div>
          <div class="field-group">
            <label for="role">Select Role</label>
            <select id="role">
              <option value="citizen">Citizen</option>
              <option value="admin">Admin</option>
              <option value="officer">Officer</option>
            </select>
          </div>

          <button type="submit" class="submit-btn">Create Account</button>
        </form>
        <!-- Error message box -->
        <div id="error-box" style="display:none; color:red; margin-top:10px;">
          <span id="error-text"></span>
        </div>

        <!-- Success message box -->
        <div id="success-section" style="display:none; color:green; margin-top:10px;">
          <span id="success-msg"></span>
        </div>

        <p class="login-link">Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>
</div>

<script src="signup.js"></script>
</body>
</html>
