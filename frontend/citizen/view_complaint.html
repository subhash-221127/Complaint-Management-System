<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix — View Complaint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="citizen.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ══════════════════════════════════════
       LIQUID POUR TIMELINE
    ══════════════════════════════════════ */

    .flow-timeline {
      position: relative;
      padding: 8px 0 4px;
    }

    .flow-step {
      display: flex;
      gap: 20px;
      position: relative;
    }

    /* ── Base pipe (grey track) ── */
    .flow-step:not(:last-child) .flow-pipe {
      position: absolute;
      left: 19px;
      top: 44px;
      width: 4px;
      bottom: 0;
      background: var(--border);
      border-radius: 999px;
      z-index: 0;
      overflow: hidden;
    }

    /* ── Liquid fill inside the pipe ── */
    .flow-step:not(:last-child) .flow-liquid {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 0%;
      /* starts empty */
      border-radius: 999px;
      transition: height 0s;
      /* JS controls timing */
      background: linear-gradient(to bottom,
          #16a34a 0%,
          #22c55e 60%,
          rgba(34, 197, 94, 0.4) 100%);
    }

    /* When JS fires scroll-trigger, we set --fill-h via inline style */
    .flow-step.liquid-done .flow-liquid {
      height: 100%;
    }

    .flow-step.liquid-active .flow-liquid {
      height: 55%;
      background: linear-gradient(to bottom,
          #16a34a 0%,
          #22c55e 55%,
          rgba(34, 197, 94, 0.12) 100%);
      animation: pourDrip 2.8s ease-in-out infinite;
    }

    @keyframes pourDrip {
      0% {
        height: 48%;
      }

      40% {
        height: 62%;
      }

      70% {
        height: 52%;
      }

      100% {
        height: 48%;
      }
    }

    /* ── Step circle dot ── */
    .flow-dot {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      border: 3px solid var(--border);
      background: var(--surface);
      transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
      /* starts invisible for entrance effect */
      opacity: 0;
      transform: scale(0.6);
    }

    /* Dot entrance animation — triggered by JS */
    .flow-step.dot-visible .flow-dot {
      opacity: 1;
      transform: scale(1);
    }

    .flow-step.dot-visible.liquid-done .flow-dot {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.18);
    }

    .flow-step.dot-visible.liquid-active .flow-dot {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      box-shadow: 0 0 0 6px rgba(249, 115, 22, 0.18);
      animation: dotPulse 2s infinite;
    }

    .flow-step.dot-visible.pending-step .flow-dot {
      background: var(--surface);
      border-color: var(--border-light);
      color: var(--placeholder);
    }

    @keyframes dotPulse {

      0%,
      100% {
        box-shadow: 0 0 0 6px rgba(249, 115, 22, 0.18);
      }

      50% {
        box-shadow: 0 0 0 12px rgba(249, 115, 22, 0.05);
      }
    }

    /* ── Step body text ── */
    .flow-body {
      flex: 1;
      padding: 8px 0 32px;
      /* starts slightly shifted down */
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .flow-step:last-child .flow-body {
      padding-bottom: 0;
    }

    .flow-step.dot-visible .flow-body {
      opacity: 1;
      transform: translateY(0);
    }

    .flow-title {
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .flow-step.liquid-done .flow-title {
      color: var(--text);
    }

    .flow-step.liquid-active .flow-title {
      color: var(--orange);
    }

    .flow-step.pending-step .flow-title {
      color: var(--placeholder);
    }

    .flow-desc {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.5;
    }

    .flow-step.pending-step .flow-desc {
      color: var(--placeholder);
    }

    .flow-date {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--light);
      margin-top: 5px;
    }

    .flow-note {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--navy);
      background: var(--navy-light);
      padding: 3px 10px;
      border-radius: 6px;
      margin-top: 6px;
    }

    /* ── Drop animation on the liquid surface ── */
    .flow-step.liquid-active .flow-pipe::after {
      content: '';
      position: absolute;
      bottom: 45%;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.55);
      animation: droplet 1.4s ease-in infinite;
    }

    @keyframes droplet {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(0.3);
        bottom: 65%;
      }

      40% {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateX(-50%) scale(0.4);
        bottom: 40%;
      }
    }

    /* ══════════════════════════════════════
       REST OF PAGE STYLES
    ══════════════════════════════════════ */
    .detail-wrap {
      max-width: 860px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--navy);
      padding: 8px 0;
      margin-bottom: 18px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      transition: gap 0.15s;
    }

    .back-btn:hover {
      gap: 10px;
    }

    .detail-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .detail-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--navy), var(--orange));
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .hero-id {
      font-family: monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--navy);
      display: block;
      margin-bottom: 5px;
    }

    .hero-title {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 8px;
    }

    .hero-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
    }

    .hg-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .hg-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hg-val {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text);
    }

    .officer-strip {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--navy-light);
      border: 1px solid rgba(26, 60, 110, 0.15);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 16px;
    }

    .officer-av {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--navy);
      color: #fff;
      font-weight: 800;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .officer-name {
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--navy);
    }

    .officer-dept {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .officer-contacts {
      display: flex;
      gap: 14px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    .officer-contacts a {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--navy);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .officer-contacts a:hover {
      text-decoration: underline;
    }

    .detail-cols {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 16px;
      align-items: start;
    }

    .detail-col-left {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .detail-col-right {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .info-section-title {
      padding: 12px 18px;
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border-light);
      background: var(--bg);
    }

    .info-section-body {
      padding: 4px 18px;
    }

    .info-row-detail {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 0.875rem;
    }

    .info-row-detail:last-child {
      border-bottom: none;
    }

    .info-row-detail .lbl {
      color: var(--muted);
      font-weight: 500;
    }

    .info-row-detail .val {
      font-weight: 700;
      text-align: right;
    }

    .desc-box {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.7;
    }

    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .comment-item {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
    }

    .comment-meta {
      display: flex;
      gap: 8px;
      font-size: 0.72rem;
      color: var(--light);
      margin-bottom: 4px;
    }

    .comment-meta strong {
      color: var(--muted);
    }

    .comment-text {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.5;
    }

    .stars {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .star {
      font-size: 1.6rem;
      color: var(--border);
      cursor: pointer;
      transition: color 0.12s, transform 0.1s;
    }

    .star:hover,
    .star.filled {
      color: #f59e0b;
    }

    .star:hover {
      transform: scale(1.2);
    }

    .action-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--navy-dark);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 200;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast i {
      color: var(--green);
    }

    @media(max-width:900px) {
      .detail-cols {
        grid-template-columns: 1fr;
      }

      .hero-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

  <script src="citizen-data.js"></script>
  <script>

    /* ══════════════════════════════════════════════
       PROFILE DROPDOWN
    ══════════════════════════════════════════════ */
    function toggleProfile(e) {
      e.stopPropagation();
      document.getElementById('profileBtn').classList.toggle('open');
      document.getElementById('profileDropdown').classList.toggle('open');
    }
    document.addEventListener('click', () => {
      document.getElementById('profileBtn')?.classList.remove('open');
      document.getElementById('profileDropdown')?.classList.remove('open');
    });

    /* ══════════════════════════════════════════════
       HELPERS
    ══════════════════════════════════════════════ */
    function statusBadgeHTML(s) {
      const map = {
        pending: '<span class="badge-status pending"><i class="fa-solid fa-clock"></i> Pending</span>',
        inprogress: '<span class="badge-status inprogress"><i class="fa-solid fa-rotate"></i> In Progress</span>',
        resolved: '<span class="badge-status resolved"><i class="fa-solid fa-circle-check"></i> Resolved</span>',
        rejected: '<span class="badge-status rejected"><i class="fa-solid fa-circle-xmark"></i> Withdrawn</span>',
      };
      return map[s] || map.pending;
    }
    function sevBadgeHTML(s) {
      return `<span class="sev-badge sev-${s}"><span class="sev-dot"></span>${s.charAt(0).toUpperCase() + s.slice(1)}</span>`;
    }

    const STEP_ICONS = {
      'Submitted': 'fa-paper-plane',
      'Verified': 'fa-shield-halved',
      'Assigned': 'fa-user-tie',
      'In Progress': 'fa-screwdriver-wrench',
      'Resolved': 'fa-circle-check',
      'Closed': 'fa-lock',
    };

    /* ══════════════════════════════════════════════
       BUILD TIMELINE HTML
       Each step has:
         - .flow-pipe  (grey track)
         - .flow-liquid (the green liquid inside)
         - .flow-dot   (circle icon)
         - .flow-body  (text)
    ══════════════════════════════════════════════ */
    function buildTimeline(timeline) {
      return timeline.map((t, i) => {
        const stateClass = t.state === 'pending' ? 'pending-step' : t.state;
        const dotIcon = t.state === 'done'
          ? 'fa-check'
          : t.state === 'active'
            ? (STEP_ICONS[t.step] || 'fa-rotate')
            : 'fa-circle';

        /* Pipe + liquid only between steps (not after the last) */
        const pipeHTML = (i < timeline.length - 1) ? `
      <div class="flow-pipe">
        <div class="flow-liquid"></div>
      </div>` : '';

        return `
      <div class="flow-step ${stateClass}" data-state="${stateClass}">
        ${pipeHTML}
        <div class="flow-dot">
          <i class="fa-solid ${dotIcon}"></i>
        </div>
        <div class="flow-body">
          <div class="flow-title">${t.step}</div>
          <div class="flow-desc">${t.desc}</div>
          ${t.date && t.date !== '—'
            ? `<div class="flow-date"><i class="fa-regular fa-clock"></i> ${t.date}</div>`
            : ''}
          ${t.note
            ? `<div class="flow-note"><i class="fa-solid fa-circle-info"></i> ${t.note}</div>`
            : ''}
        </div>
      </div>`;
      }).join('');
    }

    /* ══════════════════════════════════════════════
       SCROLL-TRIGGERED LIQUID POUR ANIMATION
       Uses IntersectionObserver — when the timeline
       container scrolls into view, each step animates
       sequentially: dot pops in → liquid pours down.
    ══════════════════════════════════════════════ */
    function initLiquidAnimation() {
      const timeline = document.getElementById('flowTimeline');
      if (!timeline) return;

      const steps = Array.from(timeline.querySelectorAll('.flow-step'));

      /* Transition speeds for the liquid pour per step */
      const POUR_DURATION = 600;  // ms — how long the liquid fills each pipe
      const STEP_DELAY = 180;  // ms — stagger between steps

      function animateSteps() {
        steps.forEach((step, i) => {
          const state = step.dataset.state;   // 'done', 'active', 'pending-step'
          const liquid = step.querySelector('.flow-liquid');
          const delay = i * (POUR_DURATION * 0.55 + STEP_DELAY);

          /* 1 ── Dot + text entrance (slightly after pipe starts filling) */
          setTimeout(() => {
            step.classList.add('dot-visible');
          }, delay + 80);

          /* 2 ── Pour the liquid down the pipe */
          if (liquid && state !== 'pending-step') {
            setTimeout(() => {
              if (state === 'done') {
                liquid.style.transition = `height ${POUR_DURATION}ms cubic-bezier(0.25,0.8,0.25,1)`;
                step.classList.add('liquid-done');
              } else if (state === 'active') {
                liquid.style.transition = `height ${POUR_DURATION * 1.3}ms cubic-bezier(0.25,0.8,0.25,1)`;
                step.classList.add('liquid-active');
              }
            }, delay + 120);
          } else if (state === 'pending-step') {
            /* Pending dots still pop in, just grey */
            setTimeout(() => {
              step.classList.add('dot-visible');
            }, delay + 80);
          }
        });
      }

      /* Use IntersectionObserver so animation fires when scrolled into view */
      const observer = new IntersectionObserver(
        (entries, obs) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              /* Small extra delay so user can see the "empty" state first */
              setTimeout(animateSteps, 200);
              obs.unobserve(entry.target); /* only fire once */
            }
          });
        },
        { threshold: 0.15 }   /* trigger when 15% of timeline is visible */
      );

      observer.observe(timeline);
    }

    /* ══════════════════════════════════════════════
       RENDER FULL DETAIL PAGE
    ══════════════════════════════════════════════ */
    function renderDetail(c) {
      document.getElementById('headerSub').textContent = c.id + ' · ' + c.category;

      const commentsHTML = (c.comments || []).map(cm => `
    <div class="comment-item">
      <div class="comment-meta"><strong>${cm.author}</strong><span>${cm.date}</span></div>
      <div class="comment-text">${cm.text}</div>
    </div>`).join('') || '<p style="font-size:0.82rem;color:var(--light);padding:8px 0;">No comments yet.</p>';

      const officerHTML = (c.officer && c.officer !== '—') ? `
    <div class="officer-strip">
      <div class="officer-av">${c.officer.split(' ').map(n => n[0]).join('')}</div>
      <div>
        <div class="officer-name"><i class="fa-solid fa-user-tie" style="margin-right:6px;opacity:0.6;"></i>${c.officer}</div>
        <div class="officer-dept">${c.dept || ''}</div>
        <div class="officer-contacts">
          ${c.officerPhone ? `<a href="tel:${c.officerPhone}"><i class="fa-solid fa-phone"></i>${c.officerPhone}</a>` : ''}
          ${c.officerEmail ? `<a href="mailto:${c.officerEmail}"><i class="fa-solid fa-envelope"></i>${c.officerEmail}</a>` : ''}
        </div>
      </div>
    </div>` : '';

      const ratingHTML = (c.status === 'resolved' && !c.rated) ? `
    <div class="info-section" id="ratingSection">
      <div class="info-section-title">⭐ Rate the Resolution</div>
      <div style="padding:20px;text-align:center;">
        <p style="font-size:0.85rem;color:var(--muted);margin-bottom:14px;">How satisfied are you with how this was handled?</p>
        <div class="stars" id="starRow">
          ${[1, 2, 3, 4, 5].map(n => `<span class="star" data-v="${n}" onclick="setRating(${n})">★</span>`).join('')}
        </div>
        <textarea class="input textarea" id="ratingComment" placeholder="Share your feedback (optional)…" style="margin-top:14px;min-height:70px;"></textarea>
        <div style="margin-top:12px;">
          <button class="btn btn-orange" onclick="submitRating('${c.id}')">
            <i class="fa-solid fa-paper-plane"></i> Submit Rating
          </button>
        </div>
      </div>
    </div>` : '';

      const actionBar = `
    <div class="action-bar">
      <button class="btn btn-outline" onclick="window.location.href='citizen_mycomplaints.html'">
        <i class="fa-solid fa-arrow-left"></i> Back to My Complaints
      </button>
      ${c.status === 'pending' ? `
        <button class="btn btn-danger" onclick="withdrawComplaint('${c.id}')">
          <i class="fa-solid fa-ban"></i> Withdraw
        </button>` : ''}
      ${c.status === 'resolved' && c.canReopen ? `
        <button class="btn btn-outline" onclick="reopenComplaint('${c.id}')">
          <i class="fa-solid fa-rotate-left"></i> Re-open Issue
        </button>` : ''}
    </div>`;

      document.getElementById('detailWrap').innerHTML = `
    <button class="back-btn" onclick="window.location.href='citizen_mycomplaints.html'">
      <i class="fa-solid fa-arrow-left"></i> Back to My Complaints
    </button>

    <!-- HERO BANNER -->
    <div class="detail-hero">
      <div class="hero-top">
        <div>
          <span class="hero-id">${c.id}</span>
          <div class="hero-title">${c.title}</div>
          <div class="hero-meta">
            ${statusBadgeHTML(c.status)}
            ${sevBadgeHTML(c.severity)}
            ${c.eta ? `<span class="eta-chip"><i class="fa-solid fa-calendar-check"></i> ETA: ${c.eta}</span>` : ''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:0.75rem;color:var(--light);margin-bottom:4px;">Filed on</div>
          <div style="font-weight:700;font-size:0.9rem;">${c.date}</div>
        </div>
      </div>
      <div class="hero-grid">
        <div class="hg-item"><span class="hg-label"><i class="fa-solid fa-tags"></i> Category</span><span class="hg-val">${c.category}</span></div>
        <div class="hg-item"><span class="hg-label"><i class="fa-solid fa-location-dot"></i> Location</span><span class="hg-val">${c.location}</span></div>
        <div class="hg-item"><span class="hg-label"><i class="fa-solid fa-building"></i> Department</span><span class="hg-val">${c.dept || '—'}</span></div>
      </div>
    </div>

    <!-- OFFICER STRIP -->
    ${officerHTML}

    <!-- TWO-COLUMN LAYOUT -->
    <div class="detail-cols">

      <!-- LEFT — liquid timeline + description + comments -->
      <div class="detail-col-left">

        <!-- ★ LIQUID POUR TIMELINE ★ -->
        <div class="info-section">
          <div class="info-section-title">📦 Complaint Progress</div>
          <div style="padding:20px 18px 16px;">
            <div class="flow-timeline" id="flowTimeline">
              ${buildTimeline(c.timeline)}
            </div>
          </div>
        </div>

        <!-- DESCRIPTION -->
        <div class="info-section">
          <div class="info-section-title">📝 Description</div>
          <div style="padding:14px 18px;">
            <div class="desc-box">${c.description}</div>
          </div>
        </div>

        <!-- COMMENTS -->
        <div class="info-section">
          <div class="info-section-title">💬 Comments &amp; Updates</div>
          <div style="padding:14px 18px;">
            <div class="comment-list" id="commentList">${commentsHTML}</div>
            <div style="display:flex;gap:8px;">
              <input class="input" type="text" id="commentInput"
                placeholder="Add a comment or update…" style="flex:1;"
                onkeydown="if(event.key==='Enter') addComment('${c.id}')"/>
              <button class="btn btn-primary btn-sm" onclick="addComment('${c.id}')">
                <i class="fa-solid fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>

        ${actionBar}

      </div><!-- /left col -->

      <!-- RIGHT — complaint info + contact + rating -->
      <div class="detail-col-right">

        <!-- COMPLAINT DETAILS -->
        <div class="info-section">
          <div class="info-section-title">📋 Complaint Info</div>
          <div class="info-section-body">
            <div class="info-row-detail"><span class="lbl">Complaint ID</span><span class="val" style="font-family:monospace;">${c.id}</span></div>
            <div class="info-row-detail"><span class="lbl">Status</span><span class="val">${statusBadgeHTML(c.status)}</span></div>
            <div class="info-row-detail"><span class="lbl">Severity</span><span class="val">${sevBadgeHTML(c.severity)}</span></div>
            <div class="info-row-detail"><span class="lbl">Category</span><span class="val">${c.category}</span></div>
            <div class="info-row-detail"><span class="lbl">Date Filed</span><span class="val">${c.date}</span></div>
            <div class="info-row-detail"><span class="lbl">Department</span><span class="val">${c.dept || '—'}</span></div>
            ${c.eta ? `<div class="info-row-detail"><span class="lbl">ETA</span><span class="val"><span class="eta-chip"><i class="fa-solid fa-calendar-check"></i> ${c.eta}</span></span></div>` : ''}
            ${c.upvotes ? `<div class="info-row-detail"><span class="lbl">Community Votes</span><span class="val"><i class="fa-solid fa-thumbs-up" style="color:var(--orange);margin-right:4px;"></i>${c.upvotes} others affected</span></div>` : ''}
            ${c.rating ? `<div class="info-row-detail"><span class="lbl">Your Rating</span><span class="val">${'★'.repeat(c.rating)}${'☆'.repeat(5 - c.rating)}</span></div>` : ''}
          </div>
        </div>

        <!-- CITIZEN CONTACT -->
        <div class="info-section">
          <div class="info-section-title">👤 Your Contact Info</div>
          <div class="info-section-body">
            <div class="info-row-detail"><span class="lbl">Name</span><span class="val">${c.name || 'Jane Doe'}</span></div>
            <div class="info-row-detail"><span class="lbl">Mobile</span><span class="val">${c.mobile || '+91 98765 43210'}</span></div>
            <div class="info-row-detail"><span class="lbl">Email</span><span class="val">${c.email || 'jane@email.com'}</span></div>
          </div>
        </div>

        <!-- RATING -->
        ${ratingHTML}

      </div><!-- /right col -->
    </div><!-- /detail-cols -->
  `;

      /* Boot the scroll-triggered animation */
      initLiquidAnimation();
    }

    /* ══════════════════════════════════════════════
       ACTIONS
    ══════════════════════════════════════════════ */
    let currentRating = 0;
    function setRating(n) {
      currentRating = n;
      document.querySelectorAll('.star').forEach(s => s.classList.toggle('filled', +s.dataset.v <= n));
    }
    function submitRating(id) {
      if (!currentRating) { alert('Please select a rating.'); return; }
      const c = CITIZEN_COMPLAINTS.find(x => x.id === id);
      if (c) { c.rated = true; c.rating = currentRating; }
      const sec = document.getElementById('ratingSection');
      if (sec) sec.innerHTML = `
    <div class="info-section-title">⭐ Rating Submitted</div>
    <div style="padding:20px 18px;text-align:center;color:var(--green-dark);font-weight:700;">
      <i class="fa-solid fa-circle-check" style="font-size:1.5rem;margin-bottom:8px;display:block;"></i>
      Thanks! You gave ${currentRating} star${currentRating > 1 ? 's' : ''}.
    </div>`;
      showToast('Thank you for your feedback!');
    }
    function withdrawComplaint(id) {
      const reason = prompt('Reason for withdrawing (optional):');
      if (reason === null) return;
      const c = CITIZEN_COMPLAINTS.find(x => x.id === id);
      if (c) c.status = 'rejected';
      showToast('Complaint withdrawn');
      setTimeout(() => window.location.href = 'citizen_mycomplaints.html', 1500);
    }
    function reopenComplaint(id) {
      if (!confirm('Re-open this complaint?')) return;
      const c = CITIZEN_COMPLAINTS.find(x => x.id === id);
      if (c) { c.status = 'pending'; c.canReopen = false; }
      showToast('Complaint re-opened');
      setTimeout(() => window.location.href = 'citizen_mycomplaints.html', 1500);
    }
    function addComment(id) {
      const input = document.getElementById('commentInput');
      if (!input || !input.value.trim()) return;
      const c = CITIZEN_COMPLAINTS.find(x => x.id === id);
      if (c) {
        if (!c.comments) c.comments = [];
        const text = input.value.trim();
        c.comments.push({ author: 'Jane Doe', date: 'Just now', text });
        input.value = '';
        const list = document.getElementById('commentList');
        const div = document.createElement('div');
        div.className = 'comment-item';
        div.innerHTML = `<div class="comment-meta"><strong>Jane Doe</strong><span>Just now</span></div><div class="comment-text">${text}</div>`;
        list.appendChild(div);
        showToast('Comment added');
      }
    }

    /* ══════════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════════ */
    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    /* ══════════════════════════════════════════════
       INIT — read ?id= from URL
    ══════════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const c = CITIZEN_COMPLAINTS.find(x => x.id === id);

      if (!c) {
        document.getElementById('detailWrap').innerHTML = `
      <div style="text-align:center;padding:80px 20px;">
        <i class="fa-solid fa-circle-exclamation" style="font-size:3rem;color:var(--border);display:block;margin-bottom:16px;"></i>
        <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:8px;">Complaint Not Found</h2>
        <p style="color:var(--muted);margin-bottom:20px;">The complaint ID "${id}" doesn't exist.</p>
        <a href="citizen_mycomplaints.html" class="btn btn-primary">← Back to My Complaints</a>
      </div>`;
        return;
      }

      renderDetail(c);
    });
  </script>
</body>

</html>
