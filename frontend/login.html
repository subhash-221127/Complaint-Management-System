<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix – Login</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

<div class="left-panel">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="left-content">
    <a href="index.html" class="logo">
      <div class="logo-icon"></div>
      <span class="logo-text">City<span>Fix</span></span>
    </a>

    <h2 class="left-tagline">Be the change<br>your city <span>needs.</span></h2>
    <p class="left-sub">Log in to start filing complaints and track civic issues in your city easily.</p>
  </div>

  <div class="left-footer">
    <p>Don't have an account? <a href="signup.html">Sign up →</a></p>
  </div>
</div>

<div class="right-panel">
  <div class="form-box">

    <div class="form-card">
      <div id="form-section">
        <div class="form-header">
          <h1 class="form-title">Login to your account</h1>
          <p class="form-sub">Enter your credentials to continue</p>
        </div>

        <form id="login-form" autocomplete="off">
          <div class="field-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="yamuna@example.com" autocomplete="username" required />
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
          </div>

          <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <!-- Error message -->
        <div id="error-box" style="display:none; color:red; margin-top:10px;">
          <span id="error-text"></span>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
