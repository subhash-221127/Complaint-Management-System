<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Submit Complaint</title>

<link rel="stylesheet" href="submit-complaint.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- HEADER -->

<header>

<h2>CityFix</h2>

<div class="user">
<i class="fa fa-user-circle"></i>
<span>Citizen</span>
</div>

</header>


<div class="container">

<!-- SIDEBAR -->

<aside class="sidebar">

<h3>Citizen Panel</h3>

<ul>

<li>
<a href="citizenhtml.html">
<i class="fa fa-home"></i> Dashboard
</a>
</li>

<li>
<a href="submit-complaint.html">
<i class="fa fa-file-circle-plus"></i> Submit Complaint
</a>
</li>

<li>
<a href="track-complaint.html">
<i class="fa fa-chart-line"></i> Track Complaints
</a>
</li>

<li>
<a href="login.html">
<i class="fa fa-sign-out"></i> Logout
</a>
</li>

</ul>

</aside>


<!-- MAIN CONTENT -->

<main class="main-content">

<h2>Submit New Complaint</h2>

<div class="form-container">

<form>

<!-- Complaint Title -->

<label>Complaint Title</label>
<input type="text"
placeholder="Example: Street Light Not Working"
required>


<!-- Department -->

<label>Department / Category</label>

<select required>

<option value="">Select Department</option>
<option>Electricity</option>
<option>Water Supply</option>
<option>Sanitation</option>
<option>Road Maintenance</option>
<option>Public Safety</option>

</select>


<!-- Description -->

<label>Description</label>

<textarea rows="5"
placeholder="Describe the issue clearly..."
required></textarea>


<!-- Location -->

<label>Location</label>

<input type="text"
placeholder="Enter problem location"
required>


<!-- Evidence -->

<label>Upload Evidence</label>

<input type="file">


<!-- Submit Button -->

<button type="submit">
<i class="fa fa-paper-plane"></i>
Submit Complaint
</button>

</form>

</div>

</main>

</div>

</body>

</html>
