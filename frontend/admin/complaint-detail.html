<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix Admin – Complaint Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">C</div>
      <div class="sidebar-brand">City<span>Fix</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
      <a href="complaints.html" class="sidebar-link active"><span class="icon">📋</span> Complaints</a>
      <a href="officers.html"   class="sidebar-link"><span class="icon">👮</span> Officers</a>
      <a href="citizens.html"   class="sidebar-link"><span class="icon">👥</span> Citizens</a>
      <a href="departments.html" class="sidebar-link"><span class="icon">🏢</span> Departments</a>
      <a href="officer-requests.html" class="sidebar-link"><span class="icon">📩</span> Officer Requests <span class="badge">4</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="../login.html" class="sidebar-link" onclick="doLogout(event)"><span class="icon">🚪</span> Logout</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Complaint Detail</h1>
        <span class="breadcrumb" id="breadcrumb">Loading…</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
        <div class="admin-profile" id="admin-profile" onclick="document.getElementById('profile-dropdown').classList.toggle('show')">
          <div class="admin-avatar" id="admin-avatar">AD</div>
          <div class="admin-info"><div class="name" id="admin-name">Admin User</div><div class="role">Administrator</div></div>
          <div class="profile-dropdown" id="profile-dropdown">
            <a href="#">👤 My Profile</a>
            <a href="../login.html" onclick="doLogout(event)">🚪 Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="page-content detail-page" id="page-content">
      <!-- Populated by JS -->
    </div>
  </div>
</div>


<script src="theme.js"></script>
<script src="admin-auth.js"></script>
<script src="theme.js"></script>
<script src="admin-auth.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const complaintId = params.get('id');

let complaint = null;
let assignedOfficer = null;

// 🔥 FETCH FROM BACKEND
async function fetchComplaint() {
  try {
    const res = await fetch(`http://localhost:5000/api/complaints/${complaintId}`);
    if (!res.ok) throw new Error("Not found");

    const c = await res.json();

    // Convert backend → frontend format
    complaint = {
      id: c._id,
      title: c.title || "-",
      citizen: c.citizen || "Anonymous",
      citizenId: c.citizenId || "—",
      department: c.department || "-",
      status: c.status || "Pending",
      priority: c.priority || "Low",
      date: c.createdAt ? new Date(c.createdAt).toLocaleDateString() : "-",
      description: c.description || "-"
    };

    document.getElementById('breadcrumb').textContent =
      complaint.id + ' — ' + complaint.department;

    renderPage();

  } catch (err) {
    document.getElementById('page-content').innerHTML = `
      <div style="text-align:center;padding:80px 20px;">
        <div style="font-size:4rem;margin-bottom:16px;">🔍</div>
        <h2>Complaint Not Found</h2>
        <a href="complaints.html" class="btn btn-primary">← Back</a>
      </div>`;
  }
}

// 🔥 RENDER UI
function renderPage() {
  document.getElementById('page-content').innerHTML = `
    <a href="complaints.html" class="btn btn-outline btn-sm" style="margin-bottom:20px;">← Back to Complaints</a>

    <div class="detail-header">
      <div>
        <h2>${complaint.title}</h2>
        <div class="meta">
          <span class="status-badge ${complaint.status.toLowerCase().replace(' ','-')}">${complaint.status}</span>
          <span class="priority-badge ${complaint.priority.toLowerCase()}">${complaint.priority}</span>
          <span>📅 ${complaint.date}</span>
          <span>🏢 ${complaint.department}</span>
        </div>
      </div>
      <span>${complaint.id}</span>
    </div>

    <div class="detail-grid">
      <div class="info-card">
        <h4>📋 Complaint Information</h4>
        <div class="info-row"><span>Complaint ID</span><span>${complaint.id}</span></div>
        <div class="info-row"><span>Department</span><span>${complaint.department}</span></div>
        <div class="info-row"><span>Status</span><span>${complaint.status}</span></div>
        <div class="info-row"><span>Priority</span><span>${complaint.priority}</span></div>
        <div class="info-row"><span>Date Filed</span><span>${complaint.date}</span></div>
      </div>

      <div class="info-card">
        <h4>👤 Citizen Information</h4>
        <div class="info-row"><span>Name</span><span>${complaint.citizen}</span></div>
        <div class="info-row"><span>ID</span><span>${complaint.citizenId}</span></div>
        <div style="margin-top:16px;">
          <div style="font-size:0.75rem;font-weight:800;">Description</div>
          <div class="description-box">${complaint.description}</div>
        </div>
      </div>
    </div>

    <!-- STATUS UPDATE -->
    <div class="status-update-section">
      <h4>📌 Update Status</h4>
      <div class="status-btns">
        <button onclick="updateStatus('Pending')">⏳ Pending</button>
        <button onclick="updateStatus('In Progress')">🔄 In Progress</button>
        <button onclick="updateStatus('Resolved')">✅ Resolved</button>
        <button onclick="updateStatus('Rejected')">❌ Rejected</button>
      </div>
    </div>
  `;
}

// 🔥 UPDATE STATUS IN DATABASE
window.updateStatus = async function(status) {
  try {
    const res = await fetch(`http://localhost:5000/api/complaints/${complaint.id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ status })
    });

    if (!res.ok) throw new Error("Failed");

    complaint.status = status;
    alert("✅ Status updated");
    renderPage();

  } catch (err) {
    alert("❌ Failed to update status");
  }
};

// LOAD
fetchComplaint();

// dropdown fix
document.addEventListener('click', e => {
  if (!document.getElementById('admin-profile').contains(e.target))
    document.getElementById('profile-dropdown').classList.remove('show');
});
</script>
</body>
</html>
