<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix Admin – Complaint Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">C</div>
      <div class="sidebar-brand">City<span>Fix</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
      <a href="complaints.html" class="sidebar-link active"><span class="icon">📋</span> Complaints</a>
      <a href="officers.html"   class="sidebar-link"><span class="icon">👮</span> Officers</a>
      <a href="citizens.html"   class="sidebar-link"><span class="icon">👥</span> Citizens</a>
      <a href="departments.html" class="sidebar-link"><span class="icon">🏢</span> Departments</a>
      <a href="officer-requests.html" class="sidebar-link"><span class="icon">📩</span> Officer Requests <span class="badge">4</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="../login.html" class="sidebar-link" onclick="doLogout(event)"><span class="icon">🚪</span> Logout</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Complaint Detail</h1>
        <span class="breadcrumb" id="breadcrumb">Loading…</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
        <div class="admin-profile" id="admin-profile" onclick="document.getElementById('profile-dropdown').classList.toggle('show')">
          <div class="admin-avatar" id="admin-avatar">AD</div>
          <div class="admin-info"><div class="name" id="admin-name">Admin User</div><div class="role">Administrator</div></div>
          <div class="profile-dropdown" id="profile-dropdown">
            <a href="#">👤 My Profile</a>
            <a href="../login.html" onclick="doLogout(event)">🚪 Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="page-content detail-page" id="page-content">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<script src="demo-data.js"></script>
<script src="theme.js"></script>
<script src="admin-auth.js"></script>
<script>
  const params      = new URLSearchParams(window.location.search);
  const complaintId = params.get('id');
  const complaint   = DEMO_COMPLAINTS.find(c => c.id === complaintId);

  if (!complaint) {
    document.getElementById('page-content').innerHTML = `
      <div style="text-align:center;padding:80px 20px;">
        <div style="font-size:4rem;margin-bottom:16px;">🔍</div>
        <h2>Complaint Not Found</h2>
        <p style="color:var(--text-secondary);margin:8px 0 24px;">The complaint you're looking for doesn't exist.</p>
        <a href="complaints.html" class="btn btn-primary">← Back to Complaints</a>
      </div>`;
  } else {
    document.getElementById('breadcrumb').textContent = complaint.id + ' — ' + complaint.department;
    const deptOfficers = DEMO_OFFICERS.filter(o => o.department === complaint.department);
    let assignedOfficer = complaint.status !== 'Pending' && deptOfficers.length > 0 ? deptOfficers[0] : null;

    function renderPage() {
      document.getElementById('page-content').innerHTML = `
        <a href="complaints.html" class="btn btn-outline btn-sm" style="margin-bottom:20px;">← Back to Complaints</a>

        <div class="detail-header">
          <div>
            <h2>${complaint.title}</h2>
            <div class="meta">
              <span class="status-badge ${complaint.status.toLowerCase().replace(' ','-')}">${complaint.status}</span>
              <span class="priority-badge ${complaint.priority.toLowerCase()}">${complaint.priority}</span>
              <span style="font-size:0.82rem;color:var(--text-secondary);">📅 ${complaint.date}</span>
              <span style="font-size:0.82rem;color:var(--text-secondary);">🏢 ${complaint.department}</span>
            </div>
          </div>
          <span style="font-size:0.85rem;color:var(--text-placeholder);font-weight:700;">${complaint.id}</span>
        </div>

        <div class="detail-grid">
          <div class="info-card">
            <h4>📋 Complaint Information</h4>
            <div class="info-row"><span class="info-label">Complaint ID</span><span class="info-value">${complaint.id}</span></div>
            <div class="info-row"><span class="info-label">Department</span><span class="info-value">${complaint.department}</span></div>
            <div class="info-row"><span class="info-label">Status</span><span class="info-value"><span class="status-badge ${complaint.status.toLowerCase().replace(' ','-')}">${complaint.status}</span></span></div>
            <div class="info-row"><span class="info-label">Priority</span><span class="info-value"><span class="priority-badge ${complaint.priority.toLowerCase()}">${complaint.priority}</span></span></div>
            <div class="info-row"><span class="info-label">Date Filed</span><span class="info-value">${complaint.date}</span></div>
          </div>
          <div class="info-card">
            <h4>👤 Citizen Information</h4>
            <div class="info-row"><span class="info-label">Name</span><span class="info-value">${complaint.citizen}</span></div>
            <div class="info-row"><span class="info-label">Citizen ID</span><span class="info-value">${complaint.citizenId || '—'}</span></div>
            <div style="margin-top:16px;">
              <div style="font-size:0.75rem;font-weight:800;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Description</div>
              <div class="description-box">${complaint.description}</div>
            </div>
          </div>
        </div>

        <!-- Assign Officer -->
        <div class="assign-section">
          <h4>👮 Assign Officer</h4>
          ${assignedOfficer ? `
            <div style="margin-bottom:16px;">
              <div style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:10px;font-weight:600;">Currently Assigned:</div>
              <div class="assigned-officer">
                <div class="assigned-avatar">${assignedOfficer.name.split(' ').map(n=>n[0]).join('')}</div>
                <div class="assigned-info">
                  <div class="name">${assignedOfficer.name}</div>
                  <div class="dept">${assignedOfficer.designation} · ${assignedOfficer.department}</div>
                  <div class="dept">📧 ${assignedOfficer.email} · 📞 ${assignedOfficer.phone}</div>
                </div>
                <button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="unassignOfficer()">Unassign</button>
              </div>
            </div>` : ''}
          <div style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:10px;font-weight:600;">
            ${assignedOfficer ? 'Reassign to a different officer:' : 'Select an officer to handle this complaint:'}
          </div>
          <div class="assign-form">
            <div class="form-group">
              <label>Department</label>
              <select id="assign-dept" onchange="filterOfficers()">
                <option value="${complaint.department}">${complaint.department}</option>
                ${DEPARTMENTS.filter(d => d !== complaint.department).map(d => `<option value="${d}">${d}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label>Officer</label>
              <select id="assign-officer">
                ${deptOfficers.filter(o=>o.status==='Active').map(o=>`<option value="${o.id}">${o.name} — ${o.designation}</option>`).join('')}
                ${deptOfficers.filter(o=>o.status==='Active').length===0 ? '<option value="">No active officers</option>' : ''}
              </select>
            </div>
            <button class="btn btn-primary btn-sm" onclick="assignOfficer()" style="height:42px;align-self:flex-end;">✅ Assign</button>
          </div>
        </div>

        <!-- Status Update -->
        <div class="status-update-section">
          <h4>📌 Update Status</h4>
          <div class="status-btns">
            <button class="status-btn ${complaint.status==='Pending'?'active-status':''}"     onclick="updateStatus('Pending')">⏳ Pending</button>
            <button class="status-btn ${complaint.status==='In Progress'?'active-status':''}" onclick="updateStatus('In Progress')">🔄 In Progress</button>
            <button class="status-btn ${complaint.status==='Resolved'?'active-status':''}"    onclick="updateStatus('Resolved')">✅ Resolved</button>
            <button class="status-btn ${complaint.status==='Rejected'?'active-status':''}"    onclick="updateStatus('Rejected')">❌ Rejected</button>
          </div>
        </div>

        <!-- Timeline -->
        <div class="timeline">
          <h4>📅 Activity Timeline</h4>
          <div class="timeline-item">
            <div class="timeline-dot orange"></div>
            <div class="timeline-content">
              <div class="event">Complaint Filed</div>
              <div class="time">${complaint.date} — Filed by ${complaint.citizen}</div>
            </div>
          </div>
          ${assignedOfficer ? `
          <div class="timeline-item">
            <div class="timeline-dot blue"></div>
            <div class="timeline-content">
              <div class="event">Assigned to ${assignedOfficer.name}</div>
              <div class="time">${complaint.date} — Assigned by Admin</div>
            </div>
          </div>` : ''}
          ${complaint.status === 'In Progress' ? `
          <div class="timeline-item">
            <div class="timeline-dot blue"></div>
            <div class="timeline-content">
              <div class="event">Status changed to In Progress</div>
              <div class="time">${complaint.date} — Updated by officer</div>
            </div>
          </div>` : ''}
          ${complaint.status === 'Resolved' ? `
          <div class="timeline-item">
            <div class="timeline-dot green"></div>
            <div class="timeline-content">
              <div class="event">Complaint Resolved</div>
              <div class="time">${complaint.date} — Resolved successfully</div>
            </div>
          </div>` : ''}
        </div>
      `;
    }

    window.filterOfficers = function() {
      const dept = document.getElementById('assign-dept').value;
      const officers = DEMO_OFFICERS.filter(o => o.department === dept && o.status === 'Active');
      document.getElementById('assign-officer').innerHTML = officers.length > 0
        ? officers.map(o => `<option value="${o.id}">${o.name} — ${o.designation}</option>`).join('')
        : '<option value="">No active officers available</option>';
    };
    window.assignOfficer = function() {
      const officerId = document.getElementById('assign-officer').value;
      if (!officerId) { alert('Please select an officer first.'); return; }
      const officer = DEMO_OFFICERS.find(o => o.id === officerId);
      assignedOfficer = officer;
      if (complaint.status === 'Pending') complaint.status = 'In Progress';
      alert(`✅ Complaint assigned to ${officer.name} successfully!`);
      renderPage();
    };
    window.unassignOfficer = function() {
      if (!confirm('Unassign this officer?')) return;
      assignedOfficer = null;
      renderPage();
    };
    window.updateStatus = function(status) {
      complaint.status = status;
      renderPage();
    };

    renderPage();
  }

  document.addEventListener('click', e => {
    if (!document.getElementById('admin-profile').contains(e.target))
      document.getElementById('profile-dropdown').classList.remove('show');
  });
</script>
</body>
</html>
