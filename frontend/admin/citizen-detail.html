<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix Admin – Citizen Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">C</div>
      <div class="sidebar-brand">City<span>Fix</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
      <a href="complaints.html" class="sidebar-link"><span class="icon">📋</span> Complaints</a>
      <a href="officers.html"   class="sidebar-link"><span class="icon">👮</span> Officers</a>
      <a href="citizens.html"   class="sidebar-link active"><span class="icon">👥</span> Citizens</a>
      <a href="departments.html" class="sidebar-link"><span class="icon">🏢</span> Departments</a>
      <a href="officer-requests.html" class="sidebar-link"><span class="icon">📩</span> Officer Requests <span class="badge">4</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="../login.html" class="sidebar-link" onclick="doLogout(event)"><span class="icon">🚪</span> Logout</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Citizen Profile</h1>
        <span class="breadcrumb" id="breadcrumb">Citizen Detail</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
        <div class="admin-profile" id="admin-profile" onclick="document.getElementById('profile-dropdown').classList.toggle('show')">
          <div class="admin-avatar" id="admin-avatar">AD</div>
          <div class="admin-info"><div class="name" id="admin-name">Admin User</div><div class="role">Administrator</div></div>
          <div class="profile-dropdown" id="profile-dropdown">
            <a href="#">👤 My Profile</a>
            <a href="../login.html" onclick="doLogout(event)">🚪 Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="page-content detail-page" id="page-content">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<script src="theme.js"></script>
<script src="admin-auth.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

async function loadCitizen() {
  try {
    // 🔥 Fetch user
    const userRes = await fetch(`http://localhost:5000/api/users/${id}`);
    if (!userRes.ok) throw new Error("User not found");

    const citizen = await userRes.json();

    // 🔥 Fetch complaints of that user
    const compRes = await fetch(`http://localhost:5000/api/complaints/user/${id}`);
    const complaints = compRes.ok ? await compRes.json() : [];

    const initials = (citizen.name || "U")
      .split(' ')
      .map(n => n[0])
      .join('');

    document.getElementById('breadcrumb').textContent =
      citizen.name + " — " + citizen._id;

    document.getElementById('page-content').innerHTML = `
      <a href="citizens.html" class="btn btn-outline btn-sm" style="margin-bottom:20px;">← Back</a>

      <div class="profile-hero">
        <div class="profile-avatar">${initials}</div>
        <div class="profile-info">
          <h2>${citizen.name}</h2>
          <div class="subtitle">Citizen since ${
            citizen.createdAt ? new Date(citizen.createdAt).toLocaleDateString() : "-"
          }</div>
          <div style="display:flex;gap:10px;margin-top:14px;">
            <span class="status-badge active">Active</span>
            <span class="status-badge in-progress">${complaints.length} Complaints</span>
          </div>
        </div>
      </div>

      <div class="detail-grid">
        <div class="info-card">
          <h4>📞 Contact</h4>
          <div class="info-row"><span>Email</span><span>${citizen.email}</span></div>
          <div class="info-row"><span>Phone</span><span>${citizen.phone || "-"}</span></div>
        </div>
        <div class="info-card">
          <h4>🆔 Account</h4>
          <div class="info-row"><span>ID</span><span>${citizen._id}</span></div>
          <div class="info-row"><span>Joined</span><span>${
            citizen.createdAt ? new Date(citizen.createdAt).toLocaleDateString() : "-"
          }</span></div>
        </div>
      </div>

      <div class="complaints-table-container">
        <div class="complaints-table-header">Complaints</div>
        <table class="data-table">
          <thead><tr><th>ID</th><th>Title</th><th>Status</th><th>Date</th></tr></thead>
          <tbody>
            ${complaints.map(c => `
              <tr onclick="window.location.href='complaint-detail.html?id=${c._id}'">
                <td><strong>${c._id}</strong></td>
                <td>${c.title}</td>
                <td><span class="status-badge ${c.status.toLowerCase().replace(' ','-')}">${c.status}</span></td>
                <td>${new Date(c.createdAt).toLocaleDateString()}</td>
              </tr>
            `).join('') || '<tr><td colspan="4">No complaints</td></tr>'}
          </tbody>
        </table>
      </div>

      <div style="margin-top:20px;text-align:right;">
        <button class="btn btn-danger" onclick="deleteCitizen()">Delete Citizen</button>
      </div>
    `;

  } catch (err) {
    document.getElementById('page-content').innerHTML =
      `<h2 style="text-align:center">Citizen Not Found</h2>`;
  }
}

// 🔥 DELETE
async function deleteCitizen() {
  if (!confirm("Delete this citizen?")) return;

  try {
    await fetch(`http://localhost:5000/api/users/${id}`, {
      method: "DELETE"
    });

    alert("Deleted");
    window.location.href = "citizens.html";

  } catch {
    alert("Error deleting");
  }
}

loadCitizen();

document.addEventListener('click', e => {
  if (!document.getElementById('admin-profile').contains(e.target))
    document.getElementById('profile-dropdown').classList.remove('show');
});
</script>
</body>
</html>
