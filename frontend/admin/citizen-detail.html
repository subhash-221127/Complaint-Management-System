<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix Admin – Citizen Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">C</div>
      <div class="sidebar-brand">City<span>Fix</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
      <a href="complaints.html" class="sidebar-link"><span class="icon">📋</span> Complaints</a>
      <a href="officers.html"   class="sidebar-link"><span class="icon">👮</span> Officers</a>
      <a href="citizens.html"   class="sidebar-link active"><span class="icon">👥</span> Citizens</a>
      <a href="departments.html" class="sidebar-link"><span class="icon">🏢</span> Departments</a>
      <a href="officer-requests.html" class="sidebar-link"><span class="icon">📩</span> Officer Requests <span class="badge">4</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="../login.html" class="sidebar-link" onclick="doLogout(event)"><span class="icon">🚪</span> Logout</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Citizen Profile</h1>
        <span class="breadcrumb" id="breadcrumb">Citizen Detail</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
        <div class="admin-profile" id="admin-profile" onclick="document.getElementById('profile-dropdown').classList.toggle('show')">
          <div class="admin-avatar" id="admin-avatar">AD</div>
          <div class="admin-info"><div class="name" id="admin-name">Admin User</div><div class="role">Administrator</div></div>
          <div class="profile-dropdown" id="profile-dropdown">
            <a href="#">👤 My Profile</a>
            <a href="../login.html" onclick="doLogout(event)">🚪 Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="page-content detail-page" id="page-content">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<script src="demo-data.js"></script>
<script src="theme.js"></script>
<script src="admin-auth.js"></script>
<script>
  const params  = new URLSearchParams(window.location.search);
  const id      = params.get('id');
  const citizen = DEMO_CITIZENS.find(c => c.id === id);

  if (!citizen) {
    document.getElementById('page-content').innerHTML = `
      <div style="text-align:center;padding:100px;">
        <h2>Citizen Not Found</h2>
        <a href="citizens.html" class="btn btn-primary" style="margin-top:20px;">Back to Citizens</a>
      </div>`;
  } else {
    document.getElementById('breadcrumb').textContent = citizen.name + ' — ' + citizen.id;
    const initials = citizen.name.split(' ').map(n => n[0]).join('');
    const citizenComplaints = DEMO_COMPLAINTS.filter(c =>
      c.citizenId === id || c.citizen === citizen.name);

    document.getElementById('page-content').innerHTML = `
      <a href="citizens.html" class="btn btn-outline btn-sm" style="margin-bottom:20px;">← Back to Citizens</a>

      <div class="profile-hero">
        <div class="profile-avatar">${initials}</div>
        <div class="profile-info">
          <h2>${citizen.name}</h2>
          <div class="subtitle">Citizen since ${citizen.joinDate}</div>
          <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
            <span class="status-badge active" style="padding:5px 12px;font-size:0.8rem;">Active Member</span>
            <span class="status-badge in-progress" style="padding:5px 12px;font-size:0.8rem;">${citizenComplaints.length} Complaints Filed</span>
          </div>
        </div>
      </div>

      <div class="detail-grid">
        <div class="info-card">
          <h4>📞 Contact Information</h4>
          <div class="info-row"><span class="info-label">Email</span><span class="info-value">${citizen.email}</span></div>
          <div class="info-row"><span class="info-label">Phone</span><span class="info-value">${citizen.phone}</span></div>
          <div class="info-row"><span class="info-label">Address</span><span class="info-value">123 City Center, Sector 4</span></div>
        </div>
        <div class="info-card">
          <h4>🆔 Account Details</h4>
          <div class="info-row"><span class="info-label">Citizen ID</span><span class="info-value">${citizen.id}</span></div>
          <div class="info-row"><span class="info-label">Join Date</span><span class="info-value">${citizen.joinDate}</span></div>
          <div class="info-row"><span class="info-label">Last Login</span><span class="info-value">Today at 10:45 AM</span></div>
        </div>
      </div>

      <div class="complaints-table-container">
        <div class="complaints-table-header">Recent Complaints by ${citizen.name}</div>
        <table class="data-table">
          <thead><tr><th>ID</th><th>Title</th><th>Status</th><th>Date</th></tr></thead>
          <tbody>
            ${citizenComplaints.map(c => `
              <tr onclick="window.location.href='complaint-detail.html?id=${c.id}'">
                <td><strong>${c.id}</strong></td>
                <td>${c.title}</td>
                <td><span class="status-badge ${c.status.toLowerCase().replace(' ','-')}">${c.status}</span></td>
                <td>${c.date}</td>
              </tr>`).join('') ||
              '<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-secondary);">No complaints found</td></tr>'}
          </tbody>
        </table>
      </div>

      <div style="margin-top:8px;display:flex;justify-content:flex-end;gap:14px;margin-bottom:32px;">
        <button class="btn btn-danger"  onclick="if(confirm('Restrict this user account?')) alert('Account restricted.')">Restrict Account</button>
        <button class="btn btn-outline" onclick="if(confirm('Delete citizen data?')){ window.location.href='citizens.html'; }">Delete Account</button>
      </div>
    `;
  }

  document.addEventListener('click', e => {
    if (!document.getElementById('admin-profile').contains(e.target))
      document.getElementById('profile-dropdown').classList.remove('show');
  });
</script>
</body>
</html>
