<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix Admin – Officer Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">C</div>
      <div class="sidebar-brand">City<span>Fix</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
      <a href="complaints.html" class="sidebar-link"><span class="icon">📋</span> Complaints</a>
      <a href="officers.html"   class="sidebar-link active"><span class="icon">👮</span> Officers</a>
      <a href="citizens.html"   class="sidebar-link"><span class="icon">👥</span> Citizens</a>
      <a href="departments.html" class="sidebar-link"><span class="icon">🏢</span> Departments</a>
      <a href="officer-requests.html" class="sidebar-link"><span class="icon">📩</span> Officer Requests <span class="badge">4</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="../login.html" class="sidebar-link" onclick="doLogout(event)"><span class="icon">🚪</span> Logout</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Officer Profile</h1>
        <span class="breadcrumb" id="breadcrumb">Officer Detail</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
        <div class="admin-profile" id="admin-profile" onclick="document.getElementById('profile-dropdown').classList.toggle('show')">
          <div class="admin-avatar" id="admin-avatar">AD</div>
          <div class="admin-info"><div class="name" id="admin-name">Admin User</div><div class="role">Administrator</div></div>
          <div class="profile-dropdown" id="profile-dropdown">
            <a href="#">👤 My Profile</a>
            <a href="../login.html" onclick="doLogout(event)">🚪 Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="page-content detail-page" id="page-content">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<script src="demo-data.js"></script>
<script src="theme.js"></script>
<script src="admin-auth.js"></script>
<script>
  const params  = new URLSearchParams(window.location.search);
  const id      = params.get('id');
  const officer = DEMO_OFFICERS.find(o => o.id === id);

  if (!officer) {
    document.getElementById('page-content').innerHTML = `
      <div style="text-align:center;padding:100px;">
        <h2>Officer Not Found</h2>
        <a href="officers.html" class="btn btn-primary" style="margin-top:20px;">Back to Officers</a>
      </div>`;
  } else {
    document.getElementById('breadcrumb').textContent = officer.name + ' — ' + officer.id;
    const initials = officer.name.split(' ').map(n => n[0]).join('');
    document.getElementById('page-content').innerHTML = `
      <a href="officers.html" class="btn btn-outline btn-sm" style="margin-bottom:20px;">← Back to Officers</a>

      <div class="profile-hero">
        <div class="profile-avatar">${initials}</div>
        <div class="profile-info">
          <h2>${officer.name}</h2>
          <div class="designation">${officer.designation}</div>
          <span class="status-badge ${officer.status.toLowerCase().replace(' ','-')}">${officer.status}</span>
          <div class="stats-row">
            <div class="stat-item"><span class="label">Total Cases</span><span class="value">${officer.casesHandled}</span></div>
            <div class="stat-item"><span class="label">Resolved</span><span class="value" style="color:var(--success)">${officer.casesResolved}</span></div>
            <div class="stat-item"><span class="label">Success Rate</span><span class="value">${Math.round((officer.casesResolved/officer.casesHandled)*100)}%</span></div>
          </div>
        </div>
      </div>

      <div class="detail-grid">
        <div class="info-card">
          <h4>📞 Contact Information</h4>
          <div class="info-row"><span class="info-label">Email</span><span class="info-value">${officer.email}</span></div>
          <div class="info-row"><span class="info-label">Phone</span><span class="info-value">${officer.phone}</span></div>
          <div class="info-row"><span class="info-label">Office</span><span class="info-value">Headquarters, Floor 4</span></div>
        </div>
        <div class="info-card">
          <h4>🏢 Employment Details</h4>
          <div class="info-row"><span class="info-label">Officer ID</span><span class="info-value">${officer.id}</span></div>
          <div class="info-row"><span class="info-label">Department</span><span class="info-value">${officer.department}</span></div>
          <div class="info-row"><span class="info-label">Join Date</span><span class="info-value">${officer.joinDate}</span></div>
        </div>
      </div>

      <div class="action-section">
        <button class="btn btn-outline" onclick="alert('Password reset link sent to officer email.')">Reset Password</button>
        <button class="btn btn-danger" onclick="if(confirm('Remove this officer?')){ window.location.href='officers.html'; }">🗑️ Remove Officer</button>
      </div>
    `;
  }

  document.addEventListener('click', e => {
    if (!document.getElementById('admin-profile').contains(e.target))
      document.getElementById('profile-dropdown').classList.remove('show');
  });
</script>
</body>
</html>
