<!DOCTYPE html>

<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix Admin – Citizens</title>
  <link rel="stylesheet" href="admin.css" />
</head>

<body>

<div class="admin-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <span class="logo-text">City<span>Fix</span></span>
    </a>


<nav class="sidebar-nav">
  <a href="dashboard.html" class="sidebar-link">📊 Dashboard</a>
  <a href="complaints.html" class="sidebar-link">📋 Complaints</a>
  <a href="officers.html" class="sidebar-link">👮 Officers</a>
  <a href="citizens.html" class="sidebar-link active">👥 Citizens</a>
  <a href="departments.html" class="sidebar-link">🏢 Departments</a>
  <a href="officer-requests.html" class="sidebar-link">📩 Officer Requests</a>
</nav>

<div class="sidebar-footer">
  <a href="../login.html" class="sidebar-link" onclick="doLogout(event)">🚪 Logout</a>


  </aside>

  <!-- MAIN -->
  <div class="main-content">


    <header class="topbar">
      <h1>Citizens</h1>
    </header>

<div class="page-content">

      <!-- SEARCH -->
      <div class="filter-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Search citizens..."
          oninput="renderCitizens()" />
      </div>

      <!-- TABLE -->
      <div class="section-card">

        <h3 id="citizens-count">👥 Citizens (0)</h3>

        <table class="data-table">

          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Joined</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="citizens-body"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script src="theme.js"></script>
<script src="admin-auth.js"></script>

<script>
let citizens = [];

// FETCH DATA
async function loadCitizens() {
  try {
    const res = await fetch("http://localhost:5000/api/citizens");
    const result = await res.json();

    citizens = result.data || [];

    renderCitizens();

  } catch (err) {
    console.error("Failed to load citizens:", err);

  }
}


function renderCitizens() {
  const q = document.getElementById("search-input").value.toLowerCase();

  let data = [...citizens];

  if (q) {
    data = data.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.email.toLowerCase().includes(q)
    );
  }

  document.getElementById("citizens-count").textContent =
    `👥 Citizens (${data.length})`;

  document.getElementById("citizens-body").innerHTML =
    data.map(c => `
      <tr>
        <td>${c._id}</td>
        <td>${c.name}</td>
        <td>${c.email}</td>
        <td>${c.phone || "-"}</td>
        <td>${c.createdAt ? new Date(c.createdAt).toLocaleDateString() : "-"}</td>
        <td>
          <button onclick="removeCitizen('${c._id}')">Remove</button>
        </td>
      </tr>
    `).join("");
}


async function removeCitizen(id) {
  if (!confirm("Remove this citizen?")) return;

  try {

    await fetch(`http://localhost:5000/api/citizens/${id}`, {
      method: "DELETE"
    });

    citizens = citizens.filter(c => c._id !== id);
    renderCitizens();

  } catch (err) {
    console.error("Delete failed:", err);

  }
}


loadCitizens();

</script>

</body>
</html>
