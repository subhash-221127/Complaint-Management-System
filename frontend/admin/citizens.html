<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix Admin – Citizens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">

  <aside class="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"
          stroke-linecap="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
          <circle cx="12" cy="10" r="3" />
        </svg>
      </div>
      <span class="logo-text">City<span>Fix</span></span>
    </a>
    <nav class="sidebar-nav">
      <a href="dashboard.html"  class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
      <a href="complaints.html" class="sidebar-link"><span class="icon">📋</span> Complaints <span class="badge">18</span></a>
      <a href="officers.html"   class="sidebar-link"><span class="icon">👮</span> Officers</a>
      <a href="citizens.html"   class="sidebar-link active"><span class="icon">👥</span> Citizens</a>
      <a href="departments.html" class="sidebar-link"><span class="icon">🏢</span> Departments</a>
      <a href="officer-requests.html" class="sidebar-link"><span class="icon">📩</span> Officer Requests <span class="badge">4</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="../login.html" class="sidebar-link" onclick="doLogout(event)"><span class="icon">🚪</span> Logout</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Citizens</h1>
        <span class="breadcrumb">Citizen Management</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
        <div class="admin-profile" id="admin-profile" onclick="document.getElementById('profile-dropdown').classList.toggle('show')">
          <div class="admin-avatar" id="admin-avatar">AD</div>
          <div class="admin-info"><div class="name" id="admin-name">Admin User</div><div class="role">Administrator</div></div>
          <div class="profile-dropdown" id="profile-dropdown">
            <a href="#">👤 My Profile</a>
            <a href="../login.html" onclick="doLogout(event)">🚪 Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="page-content">
      <div class="filter-bar">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" id="search-input" placeholder="Search citizens by name, email, or ID…" oninput="renderCitizens()" style="width:320px;" />
        </div>
        <div style="margin-left:auto;font-size:0.82rem;color:var(--text-secondary);font-weight:700;" id="citizen-total"></div>
      </div>

      <div class="section-card">
        <div class="section-card-header">
          <h3 id="citizens-count">👥 Citizens (0)</h3>
        </div>
        <div class="section-card-body">
          <table class="data-table">
            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Complaints</th><th>Joined</th><th>Action</th></tr></thead>
            <tbody id="citizens-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="theme.js"></script>
<script src="admin-auth.js"></script>

<script>
let citizens = [];

// 🔥 FETCH FROM BACKEND
async function fetchCitizens() {
  try {
    const res = await fetch("http://localhost:5000/api/users");
    if (!res.ok) throw new Error("Failed");

    const data = await res.json();

    citizens = data.map(u => ({
      id: u._id,
      name: u.name || "No Name",
      email: u.email || "-",
      phone: u.phone || "-",
      totalComplaints: u.totalComplaints || 0,
      joinDate: u.createdAt ? new Date(u.createdAt).toISOString().split('T')[0] : "-"
    }));

    renderCitizens();

  } catch (err) {
    console.error(err);
    document.getElementById('citizens-body').innerHTML =
      `<tr><td colspan="7">Failed to load citizens</td></tr>`;
  }
}

function renderCitizens() {
  const q = document.getElementById('search-input').value.toLowerCase();

  let data = [...citizens];

  if (q) {
    data = data.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.id.toLowerCase().includes(q) ||
      c.email.toLowerCase().includes(q)
    );
  }

  document.getElementById('citizens-count').textContent =
    `👥 Citizens (${data.length})`;

  document.getElementById('citizen-total').textContent =
    `Total Registered: ${citizens.length}`;

  document.getElementById('citizens-body').innerHTML = data.map(c => `
    <tr onclick="window.location.href='citizen-detail.html?id=${c.id}'">
      <td><strong>${c.id}</strong></td>
      <td>${c.name}</td>
      <td>${c.email}</td>
      <td>${c.phone}</td>
      <td>${c.totalComplaints}</td>
      <td>${c.joinDate}</td>
      <td>
        <button class="btn btn-danger btn-sm"
          onclick="event.stopPropagation(); removeCitizen('${c.id}')">
          Remove
        </button>
      </td>
    </tr>
  `).join('');
}

// 🔥 DELETE USER
async function removeCitizen(id) {
  if (!confirm("Delete this citizen?")) return;

  try {
    const res = await fetch(`http://localhost:5000/api/users/${id}`, {
      method: "DELETE"
    });

    if (!res.ok) throw new Error("Delete failed");

    alert("Citizen deleted");
    fetchCitizens();

  } catch (err) {
    console.error(err);
    alert("Error deleting citizen");
  }
}

// INIT
fetchCitizens();

document.addEventListener('click', e => {
  if (!document.getElementById('admin-profile').contains(e.target))
    document.getElementById('profile-dropdown').classList.remove('show');
});
</script>
</body>
</html>
