<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix Admin - Complaints</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">

  <aside class="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
          <circle cx="12" cy="10" r="3" />
        </svg>
      </div>
      <span class="logo-text">City<span>Fix</span></span>
    </a>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
      <a href="complaints.html" class="sidebar-link active"><span class="icon">📋</span> Complaints <span class="badge complaints-count-badge">0</span></a>
      <a href="officers.html" class="sidebar-link"><span class="icon">👮</span> Officers</a>
      <a href="citizens.html" class="sidebar-link"><span class="icon">👥</span> Citizens</a>
      <a href="departments.html" class="sidebar-link"><span class="icon">🏢</span> Departments</a>
      <a href="officer-requests.html" class="sidebar-link"><span class="icon">📩</span> Officer Requests</a>
    </nav>
    <div class="sidebar-footer">
      <a href="../login.html" class="sidebar-link" onclick="doLogout(event)"><span class="icon">L</span> Logout</a>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Complaints</h1>
        <span class="breadcrumb">All complaints from database (newest first)</span>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">M</span></button>
        <div class="admin-profile" id="admin-profile" onclick="document.getElementById('profile-dropdown').classList.toggle('show')">
          <div class="admin-avatar" id="admin-avatar">AD</div>
          <div class="admin-info"><div class="name" id="admin-name">Admin User</div><div class="role">Administrator</div></div>
          <div class="profile-dropdown" id="profile-dropdown">
            <a href="#">My Profile</a>
            <a href="../login.html" onclick="doLogout(event)">Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="page-content">
      <div class="filter-bar">
        <label>Time:</label>
        <select id="time-filter" onchange="applyFilters()">
          <option value="all">All Time</option>
          <option value="today">Today</option>
          <option value="this-week">This Week</option>
          <option value="this-month">This Month</option>
          <option value="last-6-months">Last 6 Months</option>
          <option value="last-year">Last Year</option>
        </select>

        <label>Status:</label>
        <select id="status-filter" onchange="applyFilters()">
          <option value="all">All</option>
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Resolved">Resolved</option>
          <option value="Rejected">Rejected</option>
        </select>

        <label>Department:</label>
        <select id="dept-filter" onchange="applyFilters()">
          <option value="all">All Departments</option>
        </select>

        <div class="search-box" style="margin-left:auto;">
          <span>S</span>
          <input type="text" id="search-input" placeholder="Search complaints..." oninput="debouncedFilters()" />
        </div>
      </div>

      <div class="section-card">
        <div class="section-card-header" style="display:flex; justify-content:space-between; gap:10px; align-items:center;">
          <h3 id="complaints-count">All Complaints (0)</h3>
          <button class="btn btn-outline btn-sm" onclick="refreshComplaints()">Refresh</button>
        </div>
        <div class="section-card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Citizen</th>
                <th>Department</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="complaints-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="theme.js"></script>
<script src="admin-auth.js"></script>
<script>
  const API_BASE = "http://localhost:5000/api/complaints";
  const API_ROOT = "http://localhost:5000/api";
  let complaints = [];
  let citizensById = {};
  let debounceTimer;

  function formatDate(dateValue) {
    const date = new Date(dateValue);
    if (Number.isNaN(date.getTime())) return "--";
    return date.toLocaleString();
  }

  function normalizeStatus(status) {
    const s = (status || "Pending").toLowerCase();
    if (s === "pending") return "Pending";
    if (s === "in progress" || s === "inprogress" || s === "assigned") return "In Progress";
    if (s === "resolved") return "Resolved";
    if (s === "rejected") return "Rejected";
    return status || "Pending";
  }

  function normalizePriority(priority, severity) {
    const raw = (priority || severity || "Medium").toString().toLowerCase();
    if (raw === "critical") return "Critical";
    if (raw === "high") return "High";
    if (raw === "medium") return "Medium";
    if (raw === "low") return "Low";
    return "Medium";
  }

  function normalizeDepartment(value, fallback) {
    const looksLikeObjectId = typeof value === "string" && /^[a-f0-9]{24}$/i.test(value);
    if (looksLikeObjectId) return fallback || "Department";
    return value || fallback || "--";
  }

  function getCitizenName(c) {
    if (c.citizenName) return c.citizenName;
    if (c.citizen?.name) return c.citizen.name;
    if (c.contactName) return c.contactName;
    if (c.citizenId && citizensById[c.citizenId]) return citizensById[c.citizenId];
    return "Citizen";
  }

  function populateDepartments(data) {
    const depts = [...new Set(data.map((item) => normalizeDepartment(item.department, item.category)).filter(Boolean))]
      .sort((a, b) => a.localeCompare(b));
    const deptFilter = document.getElementById("dept-filter");
    const current = deptFilter.value;

    deptFilter.innerHTML = '<option value="all">All Departments</option>' +
      depts.map((dept) => `<option value="${dept}">${dept}</option>`).join("");

    if (depts.includes(current)) {
      deptFilter.value = current;
    }
  }

  function renderComplaints(data) {
    const tbody = document.getElementById("complaints-body");
    document.getElementById("complaints-count").textContent = `All Complaints (${data.length})`;

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:20px; color:#6b7280;">No complaints found for selected filters.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map((c) => {
      const statusText = normalizeStatus(c.status);
      const statusClass = statusText.toLowerCase().replace(/\s+/g, "-");
      const priorityText = normalizePriority(c.priority, c.severity);
      const priorityClass = priorityText.toLowerCase();
      const deptText = normalizeDepartment(c.department, c.category);
      const citizenText = getCitizenName(c);
      return `
        <tr onclick="openComplaint('${c._id}')" style="cursor:pointer;">
          <td><strong>${c.complaintId || c._id}</strong></td>
          <td>${c.title || "--"}</td>
          <td>${citizenText}</td>
          <td>${deptText}</td>
          <td><span class="status-badge ${statusClass}">${statusText}</span></td>
          <td><span class="priority-badge ${priorityClass}">${priorityText}</span></td>
          <td>${formatDate(c.createdAt)}</td>
        </tr>
      `;
    }).join("");
  }

  function applyFilters() {
    const tf = document.getElementById("time-filter").value;
    const sf = document.getElementById("status-filter").value;
    const df = document.getElementById("dept-filter").value;
    const search = document.getElementById("search-input").value.trim().toLowerCase();

    let filtered = [...complaints];

    if (sf !== "all") {
      filtered = filtered.filter((c) => normalizeStatus(c.status) === sf);
    }

    if (df !== "all") {
      filtered = filtered.filter((c) => normalizeDepartment(c.department, c.category) === df);
    }

    if (tf !== "all") {
      const now = new Date();
      const threshold = new Date(now);

      if (tf === "today") {
        threshold.setHours(0, 0, 0, 0);
      } else if (tf === "this-week") {
        const day = threshold.getDay();
        const diff = (day + 6) % 7;
        threshold.setDate(threshold.getDate() - diff);
        threshold.setHours(0, 0, 0, 0);
      } else if (tf === "this-month") {
        threshold.setDate(1);
        threshold.setHours(0, 0, 0, 0);
      } else if (tf === "last-6-months") {
        threshold.setMonth(threshold.getMonth() - 6);
      } else if (tf === "last-year") {
        threshold.setFullYear(threshold.getFullYear() - 1);
      }

      filtered = filtered.filter((c) => {
        const createdAt = new Date(c.createdAt);
        return !Number.isNaN(createdAt.getTime()) && createdAt >= threshold;
      });
    }

    if (search) {
      filtered = filtered.filter((c) =>
        (c.title || "").toLowerCase().includes(search) ||
        (c.description || "").toLowerCase().includes(search) ||
        (normalizeDepartment(c.department, c.category) || "").toLowerCase().includes(search) ||
        (getCitizenName(c) || "").toLowerCase().includes(search) ||
        (c.assignedTo || "").toLowerCase().includes(search) ||
        (c._id || "").toLowerCase().includes(search)
      );
    }

    renderComplaints(filtered);
  }

  function debouncedFilters() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(applyFilters, 200);
  }

  function openComplaint(id) {
    window.location.href = `complaint-detail.html?id=${id}`;
  }

  async function refreshComplaints() {
    try {
      const [complaintsRes, citizensRes] = await Promise.all([
        fetch(API_BASE),
        fetch(`${API_ROOT}/citizens`),
      ]);
      if (!complaintsRes.ok) throw new Error("Failed to load complaints");

      complaints = await complaintsRes.json();
      citizensById = {};

      if (citizensRes.ok) {
        const citizensPayload = await citizensRes.json();
        const citizens = Array.isArray(citizensPayload) ? citizensPayload : (citizensPayload.data || []);
        citizens.forEach((citizen) => {
          citizensById[citizen._id] = citizen.name || "Citizen";
        });
      }

      populateDepartments(complaints);
      applyFilters();
    } catch (err) {
      console.error(err);
      document.getElementById("complaints-body").innerHTML =
        `<tr><td colspan="7" style="text-align:center; padding:20px; color:#dc2626;">Unable to load complaints. Check backend server.</td></tr>`;
    }
  }

  refreshComplaints();

  document.addEventListener("click", (e) => {
    const profile = document.getElementById("admin-profile");
    if (profile && !profile.contains(e.target)) {
      document.getElementById("profile-dropdown").classList.remove("show");
    }
  });
</script>
</body>
</html>
