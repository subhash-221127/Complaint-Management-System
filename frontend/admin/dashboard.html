<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityFix Admin – Dashboard</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
          <circle cx="12" cy="10" r="3" />
        </svg>
      </div>
      <span class="logo-text">City<span>Fix</span></span>
    </a>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="sidebar-link active">📊 Dashboard</a>
      <a href="complaints.html" class="sidebar-link">📋 Complaints</a>
      <a href="officers.html" class="sidebar-link">👮 Officers</a>
      <a href="citizens.html" class="sidebar-link">👥 Citizens</a>
      <a href="departments.html" class="sidebar-link">🏢 Departments</a>
      <a href="officer-requests.html" class="sidebar-link">📩 Officer Requests</a>
    </nav>

    <div class="sidebar-footer">
      <a href="../login.html" class="sidebar-link">🚪 Logout</a>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main-content">
    <header class="topbar">
      <h1 class="page-title">Dashboard</h1>
      <p class="page-sub">Overview & Analytics</p>
    </header>

    <div class="page-content">

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid"></div>

      <!-- Table -->
      <div class="section-card">
        <div class="section-card-header">
          <h3>📋 Recent Complaints</h3>
        </div>
        <div class="section-card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Citizen</th>
                <th>Department</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="recent-complaints-body"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
async function renderDashboard() {
  try {
    // 🔥 Fetch complaints from backend
    const res = await fetch("http://localhost:5000/api/complaints");
    if (!res.ok) throw new Error("Failed to fetch complaints");

    const data = await res.json();

    // Stats calculation
    const total = data.length;
    const pending = data.filter(c => c.status.toLowerCase() === "pending").length;
    const inProgress = data.filter(c => c.status.toLowerCase() === "in progress").length;
    const resolved = data.filter(c => c.status.toLowerCase() === "resolved").length;
    const critical = data.filter(c => c.priority.toLowerCase() === "critical").length;

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card blue"><div class="stat-value">${total}</div><div class="stat-label">Total</div></div>
      <div class="stat-card orange"><div class="stat-value">${pending}</div><div class="stat-label">Pending</div></div>
      <div class="stat-card purple"><div class="stat-value">${inProgress}</div><div class="stat-label">In Progress</div></div>
      <div class="stat-card green"><div class="stat-value">${resolved}</div><div class="stat-label">Resolved</div></div>
      <div class="stat-card red"><div class="stat-value">${critical}</div><div class="stat-label">Critical</div></div>
    `;

    // Table
    document.getElementById('recent-complaints-body').innerHTML = data.slice(0, 6).map(c => `
      <tr onclick="window.location.href='complaint-detail.html?id=${c._id}'">
        <td><strong>${c._id}</strong></td>
        <td>${c.title || "-"}</td>
        <td>${c.citizen || "-"}</td>
        <td>${c.department || "-"}</td>
        <td><span class="status-badge ${c.status.toLowerCase().replace(' ', '-')}">${c.status}</span></td>
        <td><span class="priority-badge ${(c.priority || "low").toLowerCase()}">${c.priority || "Low"}</span></td>
        <td>${new Date(c.createdAt).toLocaleDateString()}</td>
      </tr>
    `).join('');

  } catch (err) {
    console.error("Error loading dashboard:", err);
    document.getElementById('recent-complaints-body').innerHTML = `<tr><td colspan="7">Failed to load complaints</td></tr>`;
  }
}

// Load on page
renderDashboard();
</script>
</body>
</html>
